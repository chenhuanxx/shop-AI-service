server:
  port: ${SERVER_PORT:8813}
  error:
    include-message: always

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://${python-admin.mysql.host}:${python-admin.mysql.port}/${python-admin.mysql.database}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${python-admin.mysql.user}
    password: ${python-admin.mysql.password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

python-admin:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  mysql:
    host: ${MYSQL_HOST:127.0.0.1}
    port: ${MYSQL_PORT:3306}
    database: ${MYSQL_DATABASE:java-admin}
    user: ${MYSQL_USER:java-admin}
    password: ${MYSQL_PASSWORD:3bcmD7E4yrwcGzFR}
  weixin:
    app-id: ${WEIXIN_APP_ID:}
    app-secret: ${WEIXIN_APP_SECRET:}
